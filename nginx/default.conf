server {
    listen 80;
    server_name _;

    # Compression gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    root /usr/share/nginx/html;
    index index.html;

    # Long cache for immutable build artifacts.
    location /build/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Long cache for static assets emitted by Vite.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Short cache for HTML and route data.
    location ~* \.(html|json|xml)$ {
        add_header Cache-Control "public, max-age=600" always;
        try_files $uri =404;
    }

    # Keep logos and static public files cacheable.
    location ~* \.(svg|png|jpg|jpeg|webp|ico)$ {
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    # SPA fallback: unknown paths are handled by React Router.
    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 404 /index.html;
}
